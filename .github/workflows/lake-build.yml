name: lake build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lake-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Production NoGod core is Mathlib-free; the research-tier ReBAC module
      # pulls Mathlib, so fetch the cache during setup.
      - name: setup toolchain + cache + production gate (Rebac)
        uses: leanprover/lean-action@v1
        with:
          build-args: "Rebac"
          test: false
          lint: false
          use-mathlib-cache: true

      # Research-tier proofs: built for signal, NOT gating.
      - name: lake build Research (non-gating)
        continue-on-error: true
        run: lake build Research
